name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-core:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v2
      - name: Update pkg-config database
        run: sudo ldconfig
      - name: Setup Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@v2
      - name: Cache build
        id: cache-build
        uses: actions/cache@v4
        with:
          path: build-cache-st
          key: build-cache-st-mem64-v2-${{ hashFiles('Dockerfile', 'Makefile', 'build/*', 'src/bind/**', 'src/fftools/**') }}
          restore-keys: |
            build-cache-st-mem64-v2-
      - name: Build ffmpeg-core (memory64)
        run: make prd EXTRA_ARGS="--cache-from=type=local,src=build-cache-st --cache-to=type=local,dest=build-cache-st,mode=max"
      - name: Upload core
        uses: actions/upload-artifact@v4
        with:
          name: ffmpeg-core
          path: packages/core/dist/*
  tests:
    runs-on: ubuntu-latest
    needs:
      - build-core
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v2
      - name: Download ffmpeg-core
        uses: actions/download-artifact@v4
        with:
          name: ffmpeg-core
          path: packages/core/dist
      - name: Use Node.js 18
        uses: actions/setup-node@v2
        with:
          node-version: 18.x
      - name: Cache dependencies
        id: cache-dependencies
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            node-modules-
      - name: Install dependencies
        run: npm install
      - name: Install Chrome
        uses: browser-actions/setup-chrome@latest
        with:
          chrome-version: stable
      - name: Run tests
        env:
          CHROME_HEADLESS: 1
          CHROME_PATH: chrome
          CHROME_FLAGS: "--headless --disable-gpu --no-sandbox --enable-features=WebAssemblyMemory64,WebAssemblyJSPI"
          HEADERS: '{"Cross-Origin-Opener-Policy": "same-origin", "Cross-Origin-Embedder-Policy": "require-corp"}'
        run: |
          # Start test server with proper headers for all tests
          npm run serve -- --headers "$HEADERS" &
          sleep 15

          echo "Checking security headers..."
          curl -v http://localhost:3000/tests/ffmpeg-core-st.test.html 2>&1 | grep -i "cross-origin"

          echo "Running single-threaded memory64 tests..."
          npx mocha-headless-chrome \
            --args="$CHROME_FLAGS" \
            -a no-sandbox \
            -f http://localhost:3000/tests/ffmpeg-core-st.test.html 2>&1 | tee st-core-test.log

          npx mocha-headless-chrome \
            --args="$CHROME_FLAGS" \
            -a no-sandbox \
            -f http://localhost:3000/tests/ffmpeg-st.test.html 2>&1 | tee st-test.log

          echo "=== Test Logs ==="
          for log in *-test.log; do
            echo "Contents of $log:"
            cat $log
          done
